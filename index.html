<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F6F4F">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="To-Do">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEF1EF;
    --surface: #FFFFFF;
    --sidebar: #F5F7F6;
    --ink: #14201B;
    --ink-soft: #5B6B63;
    --ink-faint: #93A29B;
    --accent: #2F6F4F;
    --accent-dark: #204E37;
    --accent-soft: #E4EFE8;
    --border: #DCE4DF;
    --danger: #B3453D;
    --danger-soft: #F7E8E6;
    --toggle-off: #D7DEDA;
    --input-bg: #FBFCFB;
    --shadow: rgba(20, 32, 27, 0.08);

    --p-low-fg: #3D5A78;    --p-low-bg: #E4ECF3;
    --p-medium-fg: #8C5A16; --p-medium-bg: #F5E8D3;
    --p-high-fg: #8C4322;   --p-high-bg: #F5E0D3;
    --p-urgent-fg: #7A2A26; --p-urgent-bg: #F5DEDC;

    --cat-green-fg: #2F6F4F;  --cat-green-bg: #E4EFE8;
    --cat-blue-fg: #3A5D82;   --cat-blue-bg: #E2EAF2;
    --cat-amber-fg: #8C6116;  --cat-amber-bg: #F3E7CE;
    --cat-rust-fg: #8C4A22;   --cat-rust-bg: #F3DFCE;
    --cat-rose-fg: #8C3452;   --cat-rose-bg: #F3DEE4;
    --cat-purple-fg: #62468C; --cat-purple-bg: #E9E2F3;
    --cat-teal-fg: #1F6E6E;   --cat-teal-bg: #DCEEEE;
    --cat-grey-fg: #5B6B63;   --cat-grey-bg: #E8ECE9;
  }

  :root.dark {
    --bg: #1B211E;
    --surface: #212824;
    --sidebar: #1E2521;
    --ink: #D9E0DB;
    --ink-soft: #A3AFA8;
    --ink-faint: #6E7A73;
    --accent: #5C9A7C;
    --accent-dark: #7FB89A;
    --accent-soft: #26332C;
    --border: #2C3530;
    --danger: #C98479;
    --danger-soft: #33231F;
    --toggle-off: #38423C;
    --input-bg: #1D2420;
    --shadow: rgba(0, 0, 0, 0.25);

    --p-low-fg: #B7CBDE;    --p-low-bg: #26313B;
    --p-medium-fg: #E3C793; --p-medium-bg: #362E1F;
    --p-high-fg: #E0B093;   --p-high-bg: #35271C;
    --p-urgent-fg: #DDA79E; --p-urgent-bg: #33221E;

    --cat-green-fg: #7FB89A;  --cat-green-bg: #26332C;
    --cat-blue-fg: #9BB8DE;   --cat-blue-bg: #232E3B;
    --cat-amber-fg: #E3C793;  --cat-amber-bg: #362E1F;
    --cat-rust-fg: #E0A57C;   --cat-rust-bg: #35271C;
    --cat-rose-fg: #E0A0B3;   --cat-rose-bg: #351F26;
    --cat-purple-fg: #C3AEE0; --cat-purple-bg: #2C2438;
    --cat-teal-fg: #8FD1D1;   --cat-teal-bg: #1C2E2E;
    --cat-grey-fg: #A3AFA8;   --cat-grey-bg: #2A322D;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 5vh 20px;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  /* ---------- Login screen ---------- */
  .login-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    box-shadow: 0 1px 2px var(--shadow);
  }
  .login-card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    margin: 4px 0 4px;
    color: var(--ink);
  }
  .login-card p.sub { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 24px; }
  .field-label {
    display: block;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-soft);
    margin: 16px 0 6px;
  }
  #login-error {
    color: var(--danger);
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }
  .auth-toggle {
    font-size: 13px;
    color: var(--ink-soft);
    margin-top: 18px;
    text-align: center;
  }
  .link-btn {
    background: none;
    border: none;
    padding: 0;
    color: var(--accent);
    font-weight: 600;
    font-size: inherit;
    font-family: inherit;
    cursor: pointer;
    text-decoration: underline;
  }

  .app-shell {
    width: 100%;
    max-width: 920px;
    min-height: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px var(--shadow);
    display: flex;
    overflow: hidden;
    transition: background-color 0.2s ease, border-color 0.2s ease;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    transition: background-color 0.2s ease, border-color 0.2s ease;
  }

  .brand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0;
  }

  .brand .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .brand-actions { display: flex; align-items: center; gap: 2px; }

  .theme-toggle, .signout-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 12.5px;
    line-height: 1;
    padding: 3px 6px;
    border-radius: 5px;
    color: var(--ink-soft);
  }
  .theme-toggle:hover, .signout-btn:hover { background: var(--border); }

  .all-tasks-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  .all-tasks-row:hover { background: var(--border); }
  .all-tasks-row.active { background: var(--accent); color: white; }
  .all-tasks-row .square {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    background: currentColor;
    opacity: 0.6;
    flex-shrink: 0;
  }

  .sidebar-section-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px;
    margin-bottom: 8px;
  }

  .sidebar-section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 5px;
  }
  .icon-btn:hover { background: var(--accent-soft); color: var(--accent-dark); }

  ul#category-tree { list-style: none; margin: 0; padding: 0; }

  .sidebar-empty {
    font-size: 12.5px;
    color: var(--ink-faint);
    padding: 4px;
  }

  .cat-node { list-style: none; }
  .cat-children { list-style: none; padding: 0 0 0 16px; margin: 0; }

  .cat-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 4px;
    border-radius: 6px;
    cursor: pointer;
  }
  .cat-row:hover { background: var(--border); }
  .cat-row.active { background: var(--accent-soft); }
  .cat-row.active .cat-name { color: var(--accent-dark); font-weight: 600; }

  .caret, .caret-spacer {
    width: 14px;
    flex-shrink: 0;
    font-size: 10px;
    color: var(--ink-faint);
    text-align: center;
    transition: transform 0.1s ease;
    user-select: none;
  }
  .caret.collapsed { transform: rotate(-90deg); }

  .cat-name {
    flex: 1;
    font-size: 13.5px;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .row-add-btn {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 13px;
    padding: 2px 5px;
    border-radius: 4px;
    opacity: 0;
  }
  .cat-row:hover .row-add-btn { opacity: 1; }
  .row-add-btn:hover { background: var(--accent); color: white; }

  /* ---------- Main panel ---------- */
  .main-panel {
    flex: 1;
    padding: 28px 32px;
    min-width: 0;
  }

  .main-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }

  #view-title, #all-view-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 600;
    margin: 0;
    color: var(--ink);
  }

  .tag-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
    margin: 4px 0 20px;
  }

  .header-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-ghost, .btn-ghost-danger {
    background: none;
    border: 1px solid var(--border);
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
  }
  .btn-ghost:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-dark); }
  .btn-ghost-danger:hover { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }

  .option-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 14px 0 22px;
  }
  .option-label { font-size: 13px; color: var(--ink-soft); }

  .color-row {
    display: flex;
    align-items: center;
    gap: 9px;
    margin: 14px 0 4px;
  }
  .color-row-label {
    font-size: 12px;
    color: var(--ink-soft);
    margin-right: 3px;
  }
  .color-swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid transparent;
    padding: 0;
    cursor: pointer;
    transition: transform 0.1s ease, border-color 0.1s ease;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--ink); }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 1px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .cat-badge.cat-green  { color: var(--cat-green-fg);  background: var(--cat-green-bg); }
  .cat-badge.cat-blue   { color: var(--cat-blue-fg);   background: var(--cat-blue-bg); }
  .cat-badge.cat-amber  { color: var(--cat-amber-fg);  background: var(--cat-amber-bg); }
  .cat-badge.cat-rust   { color: var(--cat-rust-fg);   background: var(--cat-rust-bg); }
  .cat-badge.cat-rose   { color: var(--cat-rose-fg);   background: var(--cat-rose-bg); }
  .cat-badge.cat-purple { color: var(--cat-purple-fg); background: var(--cat-purple-bg); }
  .cat-badge.cat-teal   { color: var(--cat-teal-fg);   background: var(--cat-teal-bg); }
  .cat-badge.cat-grey   { color: var(--cat-grey-fg);   background: var(--cat-grey-bg); }

  .list-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .status-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
    display: inline-block;
  }

  .sort-select {
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    color: var(--ink-soft);
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    cursor: pointer;
  }
  .sort-select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .error-banner {
    background: var(--danger-soft);
    color: var(--danger);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 16px;
    display: none;
  }

  .add-row { display: flex; gap: 8px; margin-bottom: 20px; }

  input[type="text"], input[type="email"], input[type="password"], .add-row input[type="date"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--input-bg);
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .add-row input[type="text"] { flex: 1; width: auto; }
  .add-row input[type="date"] { flex: 0 0 150px; width: auto; font-size: 13px; color: var(--ink-soft); }

  .btn-primary {
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 0 18px;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-primary:disabled { background: #A7B8AF; cursor: not-allowed; }
  .btn-primary.full { width: 100%; margin-top: 22px; padding: 10px 0; }

  ul#task-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  li.task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
  }
  li.task:last-child { border-bottom: none; }

  .toggle {
    position: relative;
    width: 34px;
    height: 20px;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 2px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .track {
    position: absolute;
    inset: 0;
    background: var(--toggle-off);
    border-radius: 999px;
    transition: background 0.15s ease;
  }
  .toggle .thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    transition: transform 0.15s ease;
  }
  .toggle input:checked + .track { background: var(--accent); }
  .toggle input:checked + .track + .thumb { transform: translateX(14px); }
  .toggle input:focus-visible + .track { box-shadow: 0 0 0 3px var(--accent-soft); }

  .checkbox {
    position: relative;
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    cursor: pointer;
    margin-top: 2px;
  }
  .checkbox input { opacity: 0; width: 0; height: 0; position: absolute; }
  .checkbox .box {
    position: absolute;
    inset: 0;
    border: 1.5px solid var(--ink-faint);
    border-radius: 5px;
    background: transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .checkbox .box::after {
    content: '';
    position: absolute;
    left: 6px;
    top: 2px;
    width: 5px;
    height: 10px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
    opacity: 0;
    transition: opacity 0.1s ease;
  }
  .checkbox input:checked + .box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox input:checked + .box::after { opacity: 1; }
  .checkbox input:focus-visible + .box { box-shadow: 0 0 0 3px var(--accent-soft); }

  .task-body { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }

  .task-top-row { display: flex; align-items: center; gap: 8px; }

  .priority-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    border: 1.5px solid var(--ink-faint);
    background: transparent;
    transition: box-shadow 0.1s ease;
  }
  .priority-dot:hover { box-shadow: 0 0 0 4px var(--border); }

  .priority-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    transition: filter 0.1s ease;
  }
  .priority-badge:hover { filter: brightness(0.96); }
  .priority-badge.priority-low { color: var(--p-low-fg); background: var(--p-low-bg); }
  .priority-badge.priority-medium { color: var(--p-medium-fg); background: var(--p-medium-bg); }
  .priority-badge.priority-high { color: var(--p-high-fg); background: var(--p-high-bg); }
  .priority-badge.priority-urgent { color: var(--p-urgent-fg); background: var(--p-urgent-bg); }

  .task-text { font-size: 14.5px; color: var(--ink); word-break: break-word; }
  .task.done .task-text { color: var(--ink-soft); text-decoration: line-through; }

  .task-meta-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding-left: 17px; }

  .task-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-faint);
    white-space: nowrap;
  }

  .due-wrap { display: inline-flex; align-items: center; gap: 4px; }

  .due-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--ink-faint);
    background: transparent;
    border: none;
    padding: 1px 2px;
    width: 100px;
    cursor: pointer;
    border-radius: 3px;
  }
  .due-input:hover { background: var(--border); }
  .due-input:focus { outline: 1px solid var(--accent); background: var(--input-bg); }
  .due-input.overdue { color: var(--danger); font-weight: 600; }
  .due-input::-webkit-calendar-picker-indicator { filter: opacity(0.45); cursor: pointer; }
  :root.dark .due-input::-webkit-calendar-picker-indicator { filter: invert(0.75) opacity(0.55); }

  .delete-btn {
    background: none;
    border: none;
    color: var(--ink-soft);
    opacity: 0;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 4px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: opacity 0.1s ease, color 0.1s ease;
  }
  li.task:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--danger); }
  .delete-btn:focus-visible { opacity: 1; outline: 2px solid var(--accent); }

  .empty-state {
    color: var(--ink-soft);
    font-size: 13.5px;
    padding: 18px 4px;
    text-align: center;
  }

  .main-placeholder {
    color: var(--ink-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 60px 0;
    text-align: center;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
  }
  .modal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
  }
  .modal-card h3 {
    margin: 0 0 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    color: var(--ink);
  }
  #modal-message {
    font-size: 13.5px;
    color: var(--ink-soft);
    margin: 0 0 4px;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }
  .btn-danger-solid {
    background: var(--danger);
    color: white;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 0 16px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
  }
  .btn-danger-solid:hover { filter: brightness(0.92); }

  @media (max-width: 640px) {
    .app-shell { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .add-row { flex-wrap: wrap; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="login-card" id="login-card" style="display:none;">
  <p class="brand"><span class="dot"></span>TO-DO</p>
  <h2 id="login-title">Sign in</h2>
  <p class="sub">Everyone gets their own private list.</p>
  <form id="login-form">
    <label class="field-label" for="email">Email</label>
    <input type="email" id="email" required autocomplete="username" />
    <label class="field-label" for="password">Password</label>
    <input type="password" id="password" required autocomplete="current-password" />
    <button type="submit" class="btn-primary full" id="login-btn">Sign in</button>
    <p id="login-error"></p>
  </form>
  <p class="auth-toggle" id="auth-toggle-text"></p>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none;">
  <div class="modal-card">
    <h3 id="modal-title"></h3>
    <p id="modal-message" style="display:none;"></p>
    <input type="text" id="modal-input" style="display:none;" />
    <div class="modal-actions">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-confirm">OK</button>
    </div>
  </div>
</div>

<div class="app-shell" id="app-shell" style="display:none;">

  <div class="sidebar">
    <div class="brand-row">
      <p class="brand"><span class="dot"></span>TO-DO</p>
      <div class="brand-actions">
        <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
        <button class="signout-btn" id="signout-btn">Sign out</button>
      </div>
    </div>

    <div class="all-tasks-row" id="all-tasks-btn"><span class="square"></span> All tasks</div>

    <div class="sidebar-section">
      <div class="sidebar-section-title-row">
        <span class="sidebar-section-title">Categories</span>
        <button class="icon-btn" id="add-category-btn" title="New category">+</button>
      </div>
      <ul id="category-tree"></ul>
    </div>
  </div>

  <div class="main-panel">

    <div id="category-header" style="display:none;">
      <div class="main-title-row">
        <h2 id="view-title"></h2>
        <div class="header-actions">
          <button class="btn-ghost" id="add-subcategory-btn">+ Subcategory</button>
          <button class="btn-ghost" id="rename-category-btn">Rename</button>
          <button class="btn-ghost-danger" id="delete-category-btn">Delete</button>
        </div>
      </div>
      <div class="color-row" id="color-row"></div>
      <div class="option-row" id="option-row" style="display:none;"></div>
    </div>

    <div id="all-header" style="display:none;">
      <h2 id="all-view-title">All tasks</h2>
    </div>

    <div class="list-controls" id="list-controls" style="display:none;">
      <span class="status-line" id="status-line"></span>
      <select class="sort-select" id="sort-select">
        <option value="created">Sort: Date created</option>
        <option value="due" selected>Sort: Due date</option>
        <option value="priority">Sort: Priority</option>
      </select>
    </div>
    <p class="error-banner" id="error-banner"></p>

    <div class="add-row" id="add-row" style="display:none;">
      <input type="text" id="new-task-input" placeholder="Add a task…" autocomplete="off" />
      <input type="date" id="new-task-due" title="Due date (optional)" />
      <button class="btn-primary" id="add-task-btn">Add</button>
    </div>

    <ul id="task-list"></ul>
    <p class="empty-state" id="empty-state" style="display:none;"></p>
    <p class="main-placeholder" id="main-placeholder">Create a category on the left to get started.</p>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
    onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, collection, addDoc, onSnapshot, doc, updateDoc,
    deleteDoc, serverTimestamp, query, where, enableIndexedDbPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyChPUANLV2LBk3AVI401cP1AmZY1G535oY",
    authDomain: "troche-todo.firebaseapp.com",
    projectId: "troche-todo",
    storageBucket: "troche-todo.firebasestorage.app",
    messagingSenderId: "64868924253",
    appId: "1:64868924253:web:e9f459c62fd92639fe46b4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Best-effort offline cache; harmless if unsupported or blocked by another tab.
  enableIndexedDbPersistence(db).catch(() => {});

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // ---------------- Theme ----------------
  const root = document.documentElement;
  const themeToggle = document.getElementById('theme-toggle');
  function applyTheme(isDark) {
    root.classList.toggle('dark', isDark);
    themeToggle.textContent = isDark ? '☀' : '🌙';
  }
  applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
  themeToggle.addEventListener('click', () => applyTheme(!root.classList.contains('dark')));

  // ---------------- Auth ----------------
  const loginCard = document.getElementById('login-card');
  const appShell = document.getElementById('app-shell');
  const loginForm = document.getElementById('login-form');
  const loginTitle = document.getElementById('login-title');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');
  const authToggleText = document.getElementById('auth-toggle-text');
  const signoutBtn = document.getElementById('signout-btn');

  let unsubCategories = null;
  let unsubTodos = null;
  let authMode = 'signin';

  function setAuthMode(mode) {
    authMode = mode;
    loginError.style.display = 'none';
    authToggleText.innerHTML = '';
    const span = document.createElement('span');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'link-btn';
    if (mode === 'signin') {
      loginTitle.textContent = 'Sign in';
      loginBtn.textContent = 'Sign in';
      span.textContent = 'New here? ';
      btn.textContent = 'Create an account';
      btn.addEventListener('click', () => setAuthMode('signup'));
    } else {
      loginTitle.textContent = 'Create your account';
      loginBtn.textContent = 'Create account';
      span.textContent = 'Already have an account? ';
      btn.textContent = 'Sign in';
      btn.addEventListener('click', () => setAuthMode('signin'));
    }
    authToggleText.appendChild(span);
    authToggleText.appendChild(btn);
  }
  setAuthMode('signin');

  function friendlyAuthError(err) {
    switch (err.code) {
      case 'auth/email-already-in-use':
        return "An account with that email already exists — try signing in instead.";
      case 'auth/weak-password':
        return 'Password should be at least 6 characters.';
      case 'auth/invalid-email':
        return "That doesn't look like a valid email address.";
      case 'auth/user-not-found':
      case 'auth/wrong-password':
      case 'auth/invalid-credential':
        return 'Could not sign in. Check your email and password.';
      default:
        return err.message;
    }
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginCard.style.display = 'none';
      appShell.style.display = 'flex';
      attachListeners(user.uid);
    } else {
      appShell.style.display = 'none';
      loginCard.style.display = 'block';
      if (unsubCategories) { unsubCategories(); unsubCategories = null; }
      if (unsubTodos) { unsubTodos(); unsubTodos = null; }
      categories = [];
      todos = [];
      currentView = null;
    }
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = authMode === 'signin' ? 'Signing in…' : 'Creating account…';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    try {
      if (authMode === 'signin') {
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        await createUserWithEmailAndPassword(auth, email, password);
      }
    } catch (err) {
      loginError.textContent = friendlyAuthError(err);
      loginError.style.display = 'block';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = authMode === 'signin' ? 'Sign in' : 'Create account';
    }
  });

  signoutBtn.addEventListener('click', () => signOut(auth));

  // ---------------- In-memory state ----------------
  let categories = [];
  let todos = [];
  let currentView = null;
  const collapsed = new Set();
  const includeSubcategories = new Map();
  const PRIORITY_LEVELS = ['blank', 'low', 'medium', 'high', 'urgent'];
  let sortMode = 'due';

  const PRIORITY_ORDER = { urgent: 0, high: 1, medium: 2, low: 3, blank: 4 };

  const CATEGORY_COLORS = ['green', 'blue', 'amber', 'rust', 'rose', 'purple', 'teal', 'grey'];

  function categoryColor(cat) {
    return (cat && CATEGORY_COLORS.includes(cat.color)) ? cat.color : 'green';
  }

  function comparePriority(a, b) {
    const pa = PRIORITY_ORDER[normalizedPriority(a)];
    const pb = PRIORITY_ORDER[normalizedPriority(b)];
    if (pa !== pb) return pa - pb;
    return byCreatedAt(a, b);
  }

  function compareDueDate(a, b) {
    const da = a.dueDate ? parseISODate(a.dueDate).getTime() : Infinity;
    const db_ = b.dueDate ? parseISODate(b.dueDate).getTime() : Infinity;
    if (da !== db_) return da - db_;
    return byCreatedAt(a, b);
  }

  function getSortComparator() {
    if (sortMode === 'priority') return comparePriority;
    if (sortMode === 'due') return compareDueDate;
    return byCreatedAt;
  }

  // ---------------- DOM refs ----------------
  const errorBanner = document.getElementById('error-banner');
  const listControls = document.getElementById('list-controls');
  const statusLine = document.getElementById('status-line');
  const sortSelect = document.getElementById('sort-select');
  const taskList = document.getElementById('task-list');
  const emptyState = document.getElementById('empty-state');
  const mainPlaceholder = document.getElementById('main-placeholder');
  const categoryHeader = document.getElementById('category-header');
  const allHeader = document.getElementById('all-header');
  const addRow = document.getElementById('add-row');
  const newTaskInput = document.getElementById('new-task-input');
  const newTaskDue = document.getElementById('new-task-due');
  const addTaskBtn = document.getElementById('add-task-btn');
  const allTasksBtn = document.getElementById('all-tasks-btn');

  sortSelect.addEventListener('change', () => {
    sortMode = sortSelect.value;
    renderMain();
  });

  function showError(message) {
    console.error(message);
    errorBanner.textContent = message;
    errorBanner.style.display = 'block';
  }

  // ---------------- Custom modal (replaces prompt()/confirm(), which silently
  // fail to appear inside installed PWAs on Android) ----------------
  const modalOverlay = document.getElementById('modal-overlay');
  const modalTitle = document.getElementById('modal-title');
  const modalMessage = document.getElementById('modal-message');
  const modalInput = document.getElementById('modal-input');
  const modalCancelBtn = document.getElementById('modal-cancel');
  const modalConfirmBtn = document.getElementById('modal-confirm');
  let modalResolve = null;

  function closeModal(result) {
    modalOverlay.style.display = 'none';
    if (modalResolve) { modalResolve(result); modalResolve = null; }
  }

  modalCancelBtn.addEventListener('click', () => closeModal(null));
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(null); });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modalOverlay.style.display !== 'none') closeModal(null);
  });
  modalConfirmBtn.addEventListener('click', () => {
    closeModal(modalInput.style.display !== 'none' ? modalInput.value : true);
  });
  modalInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); modalConfirmBtn.click(); }
  });

  function customPrompt(title, defaultValue) {
    return new Promise((resolve) => {
      modalResolve = resolve;
      modalTitle.textContent = title;
      modalMessage.style.display = 'none';
      modalInput.style.display = 'block';
      modalInput.value = defaultValue || '';
      modalConfirmBtn.textContent = 'OK';
      modalConfirmBtn.className = 'btn-primary';
      modalOverlay.style.display = 'flex';
      setTimeout(() => { modalInput.focus(); modalInput.select(); }, 30);
    });
  }

  function customConfirm(message, options) {
    options = options || {};
    return new Promise((resolve) => {
      modalResolve = resolve;
      modalTitle.textContent = options.title || 'Are you sure?';
      modalMessage.textContent = message;
      modalMessage.style.display = 'block';
      modalInput.style.display = 'none';
      modalConfirmBtn.textContent = options.confirmLabel || 'Confirm';
      modalConfirmBtn.className = options.danger ? 'btn-danger-solid' : 'btn-primary';
      modalOverlay.style.display = 'flex';
    });
  }

  function byCreatedAt(a, b) {
    const at = a.createdAt ? a.createdAt.toMillis() : 0;
    const bt = b.createdAt ? b.createdAt.toMillis() : 0;
    return at - bt;
  }

  function getDescendantIds(categoryId) {
    const direct = categories.filter(c => c.parentId === categoryId).map(c => c.id);
    let all = [...direct];
    direct.forEach(childId => { all = all.concat(getDescendantIds(childId)); });
    return all;
  }

  function normalizedPriority(task) {
    const p = task.priority;
    if (!p || p === 'none') return 'blank';
    return p;
  }

  function parseISODate(iso) {
    const [y, m, d] = iso.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function isOverdue(task) {
    if (!task.dueDate || task.done) return false;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return parseISODate(task.dueDate) < today;
  }

  // ---------------- Firestore listeners ----------------
  function attachListeners(uid) {
    const categoriesQuery = query(collection(db, 'categories'), where('uid', '==', uid));
    unsubCategories = onSnapshot(categoriesQuery, (snap) => {
      categories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!currentView) {
        const roots = categories.filter(c => !c.parentId).sort(byCreatedAt);
        if (roots.length > 0) currentView = { type: 'category', value: roots[0].id };
      }
      errorBanner.style.display = 'none';
      render();
    }, (err) => showError(`Couldn't load categories: ${err.message}`));

    const todosQuery = query(collection(db, 'todos'), where('uid', '==', uid));
    unsubTodos = onSnapshot(todosQuery, (snap) => {
      todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render();
    }, (err) => showError(`Couldn't load tasks: ${err.message}`));
  }

  // ---------------- Category actions ----------------
  async function addCategory(parentId) {
    const name = await customPrompt(parentId ? 'Subcategory name' : 'Category name');
    if (!name || !name.trim()) return;
    try {
      const newDoc = await addDoc(collection(db, 'categories'), {
        name: name.trim(), parentId: parentId || null, uid: auth.currentUser.uid,
        color: 'green', createdAt: serverTimestamp()
      });
      currentView = { type: 'category', value: newDoc.id };
    } catch (err) {
      showError(`Couldn't create category: ${err.message}`);
    }
  }

  function setCategoryColor(categoryId, color) {
    updateDoc(doc(db, 'categories', categoryId), { color })
      .catch((err) => showError(`Couldn't set color: ${err.message}`));
  }

  async function renameCategory(categoryId, currentName) {
    const name = await customPrompt('Rename category', currentName);
    if (!name || !name.trim()) return;
    try {
      await updateDoc(doc(db, 'categories', categoryId), { name: name.trim() });
    } catch (err) {
      showError(`Couldn't rename category: ${err.message}`);
    }
  }

  async function deleteCategoryCascade(categoryId) {
    const childIds = categories.filter(c => c.parentId === categoryId).map(c => c.id);
    for (const childId of childIds) {
      await deleteCategoryCascade(childId);
    }
    const tasksToDelete = todos.filter(t => t.categoryId === categoryId);
    for (const t of tasksToDelete) {
      await deleteDoc(doc(db, 'todos', t.id));
    }
    await deleteDoc(doc(db, 'categories', categoryId));
  }

  async function handleDeleteCategory(categoryId, name) {
    const ok = await customConfirm(
      `Delete "${name}" and everything inside it (subcategories + tasks)? This can't be undone.`,
      { title: 'Delete category?', confirmLabel: 'Delete', danger: true }
    );
    if (!ok) return;
    try {
      await deleteCategoryCascade(categoryId);
      if (currentView && currentView.type === 'category' && currentView.value === categoryId) {
        currentView = null;
      }
    } catch (err) {
      showError(`Couldn't delete category: ${err.message}`);
    }
  }

  document.getElementById('add-category-btn').addEventListener('click', () => addCategory(null));
  document.getElementById('add-subcategory-btn').addEventListener('click', () => {
    if (currentView && currentView.type === 'category') addCategory(currentView.value);
  });
  document.getElementById('rename-category-btn').addEventListener('click', () => {
    if (currentView && currentView.type === 'category') {
      const cat = categories.find(c => c.id === currentView.value);
      if (cat) renameCategory(cat.id, cat.name);
    }
  });
  document.getElementById('delete-category-btn').addEventListener('click', () => {
    if (currentView && currentView.type === 'category') {
      const cat = categories.find(c => c.id === currentView.value);
      if (cat) handleDeleteCategory(cat.id, cat.name);
    }
  });
  allTasksBtn.addEventListener('click', () => { currentView = { type: 'all' }; render(); });

  // ---------------- Task actions ----------------
  async function addTask() {
    if (!currentView || currentView.type !== 'category') return;
    const value = newTaskInput.value.trim();
    if (!value) return;
    const dueDate = newTaskDue.value || null;
    newTaskInput.value = '';
    newTaskDue.value = '';
    addTaskBtn.disabled = true;
    try {
      await addDoc(collection(db, 'todos'), {
        text: value,
        done: false,
        categoryId: currentView.value,
        uid: auth.currentUser.uid,
        createdAt: serverTimestamp(),
        dueDate: dueDate,
        priority: 'blank'
      });
    } catch (err) {
      showError(`Couldn't add task: ${err.message}`);
      newTaskInput.value = value;
    } finally {
      addTaskBtn.disabled = false;
    }
  }
  addTaskBtn.addEventListener('click', addTask);
  newTaskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });

  function toggleTask(id, done) {
    updateDoc(doc(db, 'todos', id), { done }).catch((err) => showError(`Couldn't update task: ${err.message}`));
  }
  function removeTask(id) {
    deleteDoc(doc(db, 'todos', id)).catch((err) => showError(`Couldn't delete task: ${err.message}`));
  }
  function cyclePriority(task) {
    const current = normalizedPriority(task);
    const idx = PRIORITY_LEVELS.indexOf(current);
    const next = PRIORITY_LEVELS[(idx + 1) % PRIORITY_LEVELS.length];
    updateDoc(doc(db, 'todos', task.id), { priority: next })
      .catch((err) => showError(`Couldn't update priority: ${err.message}`));
  }
  function updateDueDate(taskId, value) {
    updateDoc(doc(db, 'todos', taskId), { dueDate: value || null })
      .catch((err) => showError(`Couldn't update due date: ${err.message}`));
  }

  // ---------------- Selection ----------------
  function selectCategory(id) { currentView = { type: 'category', value: id }; render(); }

  // ---------------- Rendering ----------------
  function render() {
    renderCategoryTree();
    renderMain();
    allTasksBtn.classList.toggle('active', !!(currentView && currentView.type === 'all'));
  }

  function renderCategoryTree() {
    const treeEl = document.getElementById('category-tree');
    treeEl.innerHTML = '';
    const roots = categories.filter(c => !c.parentId).sort(byCreatedAt);
    if (roots.length === 0) {
      const li = document.createElement('li');
      li.className = 'sidebar-empty';
      li.textContent = 'No categories yet';
      treeEl.appendChild(li);
      return;
    }
    roots.forEach(cat => treeEl.appendChild(renderCategoryNode(cat)));
  }

  function renderCategoryNode(cat) {
    const li = document.createElement('li');
    li.className = 'cat-node';

    const row = document.createElement('div');
    row.className = 'cat-row' + (currentView && currentView.type === 'category' && currentView.value === cat.id ? ' active' : '');

    const children = categories.filter(c => c.parentId === cat.id).sort(byCreatedAt);

    if (children.length > 0) {
      const caret = document.createElement('span');
      caret.className = 'caret' + (collapsed.has(cat.id) ? ' collapsed' : '');
      caret.textContent = '▾';
      caret.addEventListener('click', (e) => {
        e.stopPropagation();
        if (collapsed.has(cat.id)) collapsed.delete(cat.id); else collapsed.add(cat.id);
        render();
      });
      row.appendChild(caret);
    } else {
      const spacer = document.createElement('span');
      spacer.className = 'caret-spacer';
      row.appendChild(spacer);
    }

    const nameSpan = document.createElement('span');
    nameSpan.className = 'cat-name';
    nameSpan.textContent = cat.name;

    const dot = document.createElement('span');
    dot.className = 'cat-dot';
    dot.style.background = `var(--cat-${categoryColor(cat)}-fg)`;
    row.appendChild(dot);
    row.appendChild(nameSpan);

    const addBtn = document.createElement('button');
    addBtn.className = 'row-add-btn';
    addBtn.textContent = '+';
    addBtn.title = 'Add subcategory';
    addBtn.addEventListener('click', (e) => { e.stopPropagation(); addCategory(cat.id); });
    row.appendChild(addBtn);

    row.addEventListener('click', () => selectCategory(cat.id));
    li.appendChild(row);

    if (children.length > 0 && !collapsed.has(cat.id)) {
      const childUl = document.createElement('ul');
      childUl.className = 'cat-children';
      children.forEach(child => childUl.appendChild(renderCategoryNode(child)));
      li.appendChild(childUl);
    }

    return li;
  }

  function renderColorRow(cat) {
    const row = document.getElementById('color-row');
    row.innerHTML = '';
    const label = document.createElement('span');
    label.className = 'color-row-label';
    label.textContent = 'Color';
    row.appendChild(label);

    const current = categoryColor(cat);
    CATEGORY_COLORS.forEach((color) => {
      const btn = document.createElement('button');
      btn.className = 'color-swatch' + (color === current ? ' selected' : '');
      btn.style.background = `var(--cat-${color}-fg)`;
      btn.title = color;
      btn.addEventListener('click', () => setCategoryColor(cat.id, color));
      row.appendChild(btn);
    });
  }

  function renderOptionRow(cat, descendantIds) {
    const row = document.getElementById('option-row');
    row.innerHTML = '';
    if (descendantIds.length === 0) {
      row.style.display = 'none';
      return;
    }
    row.style.display = 'flex';

    const label = document.createElement('label');
    label.className = 'toggle';
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = !!includeSubcategories.get(cat.id);
    checkbox.addEventListener('change', () => {
      includeSubcategories.set(cat.id, checkbox.checked);
      renderMain();
    });
    const track = document.createElement('span');
    track.className = 'track';
    const thumb = document.createElement('span');
    thumb.className = 'thumb';
    label.appendChild(checkbox);
    label.appendChild(track);
    label.appendChild(thumb);

    const text = document.createElement('span');
    text.className = 'option-label';
    text.textContent = 'Include subcategories';

    row.appendChild(label);
    row.appendChild(text);
  }

  function renderMain() {
    if (!currentView) {
      categoryHeader.style.display = 'none';
      allHeader.style.display = 'none';
      addRow.style.display = 'none';
      statusLine.style.display = 'none';
      listControls.style.display = 'none';
      taskList.innerHTML = '';
      emptyState.style.display = 'none';
      mainPlaceholder.style.display = 'block';
      return;
    }
    mainPlaceholder.style.display = 'none';
    statusLine.style.display = 'inline-block';
    listControls.style.display = 'flex';

    let tasksToShow = [];
    let showCategoryLabel = false;

    if (currentView.type === 'category') {
      const cat = categories.find(c => c.id === currentView.value);
      if (!cat) { currentView = null; renderMain(); return; }
      categoryHeader.style.display = 'block';
      allHeader.style.display = 'none';
      addRow.style.display = 'flex';
      document.getElementById('view-title').textContent = cat.name;
      renderColorRow(cat);

      const descendantIds = getDescendantIds(cat.id);
      renderOptionRow(cat, descendantIds);
      const includeChildren = descendantIds.length > 0 && !!includeSubcategories.get(cat.id);
      const relevantIds = includeChildren ? [cat.id, ...descendantIds] : [cat.id];
      tasksToShow = todos.filter(t => relevantIds.includes(t.categoryId));
      showCategoryLabel = includeChildren;
    } else if (currentView.type === 'all') {
      categoryHeader.style.display = 'none';
      allHeader.style.display = 'block';
      addRow.style.display = 'none';
      tasksToShow = todos;
      showCategoryLabel = true;
    }

    renderTaskList(tasksToShow, showCategoryLabel);
  }

  function renderTaskList(tasks, showCategoryLabel) {
    taskList.innerHTML = '';
    const sorted = [...tasks].sort(getSortComparator());

    emptyState.style.display = sorted.length === 0 ? 'block' : 'none';
    emptyState.textContent = currentView.type === 'all'
      ? 'No tasks anywhere yet. Create a category and add one.'
      : 'No tasks queued. Add one above to get started.';

    let doneCount = 0;

    sorted.forEach((task) => {
      if (task.done) doneCount++;

      const li = document.createElement('li');
      li.className = 'task' + (task.done ? ' done' : '');

      const label = document.createElement('label');
      label.className = 'checkbox';
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = !!task.done;
      checkbox.addEventListener('change', () => toggleTask(task.id, checkbox.checked));
      const box = document.createElement('span');
      box.className = 'box';
      label.appendChild(checkbox);
      label.appendChild(box);

      const body = document.createElement('div');
      body.className = 'task-body';

      const topRow = document.createElement('div');
      topRow.className = 'task-top-row';

      const priority = normalizedPriority(task);
      let priorityEl;
      if (priority === 'blank') {
        priorityEl = document.createElement('span');
        priorityEl.className = 'priority-dot';
        priorityEl.title = 'Priority: blank (click to set)';
      } else {
        priorityEl = document.createElement('span');
        priorityEl.className = 'priority-badge priority-' + priority;
        priorityEl.textContent = priority;
        priorityEl.title = 'Priority: ' + priority + ' (click to change)';
      }
      priorityEl.addEventListener('click', () => cyclePriority(task));
      topRow.appendChild(priorityEl);

      const text = document.createElement('span');
      text.className = 'task-text';
      text.textContent = task.text;
      topRow.appendChild(text);

      body.appendChild(topRow);

      const metaRow = document.createElement('div');
      metaRow.className = 'task-meta-row';

      if (showCategoryLabel) {
        const cat = categories.find(c => c.id === task.categoryId);
        const catMeta = document.createElement('span');
        catMeta.className = 'cat-badge cat-' + categoryColor(cat);
        catMeta.textContent = cat ? cat.name.toUpperCase() : '';
        metaRow.appendChild(catMeta);
      }

      const dueWrap = document.createElement('span');
      dueWrap.className = 'due-wrap';
      const dueLabel = document.createElement('span');
      dueLabel.className = 'task-meta';
      dueLabel.textContent = 'DUE';
      const dueInput = document.createElement('input');
      dueInput.type = 'date';
      dueInput.className = 'due-input' + (isOverdue(task) ? ' overdue' : '');
      dueInput.value = task.dueDate || '';
      dueInput.addEventListener('change', () => updateDueDate(task.id, dueInput.value));
      dueWrap.appendChild(dueLabel);
      dueWrap.appendChild(dueInput);
      metaRow.appendChild(dueWrap);

      body.appendChild(metaRow);

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.setAttribute('aria-label', 'Delete task');
      del.textContent = '✕';
      del.addEventListener('click', () => removeTask(task.id));

      li.appendChild(label);
      li.appendChild(body);
      li.appendChild(del);
      taskList.appendChild(li);
    });

    const total = sorted.length;
    const active = total - doneCount;
    statusLine.textContent = `${active} active, ${doneCount} completed`;
  }
</script>
</body>
</html>
